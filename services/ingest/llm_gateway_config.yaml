# services/ingest/llm_gateway/config.yaml
#
# LLM-Gateway Konfiguration
# Provider wechseln: active_provider ändern → kein Code-Eingriff nötig
# API-Keys: in NDI/.env speichern (niemals hier!)

# ── Aktiver Provider ──────────────────────────────────────────────────────────
active_provider: gemini    # gemini | openai | anthropic | ollama

# ── Provider-Definitionen ─────────────────────────────────────────────────────
providers:

  gemini:
    model:           "gemini-2.5-flash"
    api_key_env:     "GEMINI_API_KEY"
    max_tokens:      8192
    temperature:     0.0
    timeout_sek:     60
    # json_mode_fuer_extraktion: true  → responseMimeType=application/json
    # Bei Freitext-Prompts (z.B. ps_antwort) muss json_mode im Prompt
    # gesteuert werden – das Gateway liest diesen Parameter
    json_mode_unterstuetzt: false   # Gemini: json_mode gibt generisches Template
    beschreibung:    "Google Gemini 2.5 Flash – Free Tier"

  gemini_flash_lite:
    model:           "gemini-3.1-flash-lite"
    api_key_env:     "GEMINI_API_KEY"
    max_tokens:      8192
    temperature:     0.0
    timeout_sek:     60
    thinking_level:  "low"
    # Bekanntes Problem: json_mode=True überschreibt den System-Prompt
    # und liefert generisches Template → json_mode immer deaktiviert
    json_mode_unterstuetzt: false   # JSON muss per Prompt gesteuert werden
    beschreibung:    "Google Gemini 3.1 Flash-Lite – Free Tier, 2.5× schneller als 2.5 Flash"

  openai:
    model:           "gpt-4o"
    api_key_env:     "OPENAI_API_KEY"
    max_tokens:      8192
    temperature:     0.0
    timeout_sek:     60
    json_mode_unterstuetzt: true    # OpenAI json_mode zuverlässig
    beschreibung:    "OpenAI GPT-4o – Cloud API"

  anthropic:
    model:           "claude-opus-4-5"
    api_key_env:     "ANTHROPIC_API_KEY"
    max_tokens:      8192
    temperature:     0.0
    timeout_sek:     60
    json_mode_unterstuetzt: false   # Claude nutzt kein json_mode
    beschreibung:    "Anthropic Claude – Cloud API"

  ollama:
    model:           "mistral:7b-instruct"
    base_url:        "http://localhost:11434"
    max_tokens:      4096
    temperature:     0.0
    timeout_sek:     120
    json_mode_unterstuetzt: false   # Ollama: JSON per Prompt steuern
    beschreibung:    "Ollama – On-Premise (lokal)"

# ── Retry-Verhalten ───────────────────────────────────────────────────────────
retry:
  max_versuche:  3
  wartezeit_sek: 8.0   # erhöht für 503-Fehler (Server temporär nicht verfügbar)

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  prompt_loggen:    false   # Prompts in Langfuse/DB loggen
  antwort_loggen:   false   # Antworten loggen (Datenschutz!)
  fehler_loggen:    true
