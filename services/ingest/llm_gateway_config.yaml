active_provider: gemini_flash_lite
providers:
  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    max_tokens: 8192
    temperature: 0
    timeout_sek: 60
    beschreibung: Google Gemini 2.5 Flash – Free Tier
  gemini_flash_lite:
    model: gemini-3.1-flash-lite
    api_key_env: GEMINI_API_KEY
    max_tokens: 8192
    temperature: 0
    timeout_sek: 60
    thinking_level: low
    beschreibung: Google Gemini 3.1 Flash-Lite – Free Tier, 2.5× schneller als 2.5
      Flash
  openai:
    model: gpt-4o
    api_key_env: OPENAI_API_KEY
    max_tokens: 8192
    temperature: 0
    timeout_sek: 60
    beschreibung: OpenAI GPT-4o – Cloud API
  anthropic:
    model: claude-opus-4-5
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    temperature: 0
    timeout_sek: 60
    beschreibung: Anthropic Claude – Cloud API
  ollama:
    model: mistral:7b-instruct
    base_url: http://localhost:11434
    max_tokens: 4096
    temperature: 0
    timeout_sek: 120
    beschreibung: Ollama – On-Premise (lokal)
retry:
  max_versuche: 3
  wartezeit_sek: 8
logging:
  prompt_loggen: false
  antwort_loggen: false
  fehler_loggen: true
