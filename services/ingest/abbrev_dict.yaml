# NDI – Abkürzungswörterbuch
# Datei: services/ingest/abbrev_dict.yaml
#
# Dieses Wörterbuch wird vom AbbrevNormalizer verwendet um
# Abkürzungen in Dokument-Texten vor dem Chunking aufzulösen.
#
# Struktur:
#   - abbrev:   Die Abkürzung exakt wie im Dokument
#   - resolved: Vollständige Auflösung
#   - context:  Optional – nur auflösen wenn dieses Wort im Kontext steht
#               (±100 Zeichen). Leer = immer auflösen.
#   - label:    Entitätstyp (für NER-Anreicherung)
#
# Reihenfolge: Längere Abkürzungen zuerst (verhindert Teilauflösungen)
# Beispiel: "NHundG" vor "G" prüfen.
#
# NICHT auflösen:
#   - § X Abs. Y Satz Z  → Normreferenzen bleiben unverändert (Traceability)
#   - Abs. Nr. Satz       → Strukturmarker bleiben unverändert
#   - Jahreszahlen, Datumsangaben

abbreviations:

  # ── Bundesgesetze ────────────────────────────────────────────────────────
  - abbrev: "GG"
    resolved: "Grundgesetz"
    context: ["Artikel", "Art.", "gemäß", "nach", "§"]
    label: "GESETZ"

  - abbrev: "BGB"
    resolved: "Bürgerliches Gesetzbuch"
    context: []
    label: "GESETZ"

  - abbrev: "StGB"
    resolved: "Strafgesetzbuch"
    context: []
    label: "GESETZ"

  - abbrev: "VwVfG"
    resolved: "Verwaltungsverfahrensgesetz"
    context: []
    label: "GESETZ"

  - abbrev: "VwGO"
    resolved: "Verwaltungsgerichtsordnung"
    context: []
    label: "GESETZ"

  - abbrev: "DSGVO"
    resolved: "Datenschutz-Grundverordnung"
    context: []
    label: "GESETZ"

  - abbrev: "BDSG"
    resolved: "Bundesdatenschutzgesetz"
    context: []
    label: "GESETZ"

  - abbrev: "TierSchG"
    resolved: "Tierschutzgesetz"
    context: []
    label: "GESETZ"

  - abbrev: "BImSchG"
    resolved: "Bundes-Immissionsschutzgesetz"
    context: []
    label: "GESETZ"

  - abbrev: "BNatSchG"
    resolved: "Bundesnaturschutzgesetz"
    context: []
    label: "GESETZ"

  # ── Niedersächsische Gesetze ──────────────────────────────────────────────
  - abbrev: "NHundG"
    resolved: "Niedersächsisches Gesetz über das Halten von Hunden"
    context: []
    label: "GESETZ"

  - abbrev: "NMG"
