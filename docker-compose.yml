name: mnr

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # Chunk-Store, Embedding-Store, Audit-Log
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mnr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO – Objektspeicher
  # Artefakte, IM-Versionierung, Dokument-Upload
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mnr-minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO Init – legt die Buckets an
  # läuft einmalig, dann beendet (restart: no)
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: mnr-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET};
        mc mb --ignore-existing local/mnr-dokumente;
        mc mb --ignore-existing local/mnr-informationsmodelle;
        echo 'MinIO Buckets bereit.';
      "

  # ─────────────────────────────────────────────
  # Apache Tika 2.x – Dokument-Parsing
  # Unterstützt PDF, DOCX, HTML, RTF u.v.m.
  # ─────────────────────────────────────────────
  tika:
    image: apache/tika:2.9.2-full
    container_name: mnr-tika
    restart: unless-stopped
    ports:
      - "${TIKA_PORT}:9998"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9998/tika || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  minio_data:
