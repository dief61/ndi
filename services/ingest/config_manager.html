<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NDI Config Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e1117;
    --surface:  #161b27;
    --surface2: #1e2535;
    --border:   #2a3348;
    --accent:   #4f8ef7;
    --accent2:  #64d9a8;
    --warn:     #f7c44f;
    --danger:   #f76f6f;
    --text:     #e2e8f0;
    --muted:    #7c8da6;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  /* Hell-Modus */
  body.light {
    --bg:       #f5f7fa;
    --surface:  #ffffff;
    --surface2: #eef1f6;
    --border:   #d0d7e3;
    --accent:   #2563eb;
    --accent2:  #059669;
    --warn:     #d97706;
    --danger:   #dc2626;
    --text:     #1e293b;
    --muted:    #64748b;
  }
  body.light .yaml-editor { background: #f8fafc; color: #1e293b; }
  body.light .md-wrap pre { background: #f1f5f9; }
  body.light .md-wrap pre code { color: #334155; }
  body.light .home-logo-inner { background: linear-gradient(135deg,#dbeafe,#f0fdf4); }

  /* Schalter */
  .theme-toggle {
    display: flex; align-items: center; gap: 6px;
    margin-left: 16px; padding: 0 4px;
    border-left: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .theme-icon { font-size: 15px; transition: transform 0.3s; }
  body.light .theme-icon { transform: rotate(180deg); }
  .theme-label {
    font-size: 11px; color: var(--muted); white-space: nowrap;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    background: rgba(79,142,247,0.1);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(79,142,247,0.3);
  }
  header h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .api-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.online  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .dot.offline { background: var(--danger); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* ── Sidebar ── */
  aside {
    width: 220px;
    min-width: 220px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 16px 0;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 16px 8px;
  }
  .nav-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active {
    border-left-color: var(--accent);
    background: rgba(79,142,247,0.08);
  }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-text { font-size: 13px; font-weight: 400; }
  .nav-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  .toolbar {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
  }
  .toolbar-title {
    font-size: 14px;
    font-weight: 500;
  }
  .toolbar-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: 4px;
  }
  .spacer { flex: 1; }
  .btn {
    padding: 6px 14px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: rgba(247,111,111,0.1); }
  .btn-warn { background: transparent; color: var(--warn); border-color: var(--warn); }
  .btn-warn:hover { background: rgba(247,196,79,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── View Toggle ── */
  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .view-btn {
    padding: 5px 10px;
    font-size: 11px;
    font-family: var(--sans);
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    border: none;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--accent); color: #fff; }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ── Form View ── */
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .field-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 12px;
    align-items: start;
    margin-bottom: 12px;
  }
  .field-label {
    font-size: 13px;
    font-weight: 500;
    padding-top: 7px;
  }
  .field-help {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  input[type=text], input[type=number], select, textarea {
    width: 100%;
    padding: 7px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { font-family: var(--mono); font-size: 12px; resize: vertical; min-height: 80px; }
  select option { background: var(--surface2); }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }
  .toggle {
    position: relative;
    width: 36px; height: 20px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: 0.2s;
  }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before { transform: translateX(16px); }

  /* ── Tag Input ── */
  .tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    min-height: 40px;
    cursor: text;
  }
  .tag-container:focus-within { border-color: var(--accent); }
  .tag {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: rgba(79,142,247,0.15);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 4px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
  }
  .tag-del {
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
  }
  .tag-del:hover { color: var(--danger); }
  .tag-input {
    border: none !important;
    background: transparent !important;
    padding: 3px 4px !important;
    font-size: 12px !important;
    width: 120px;
    min-width: 80px;
    color: var(--text);
    font-family: var(--mono);
  }

  /* ── Raw YAML Editor ── */
  .yaml-editor {
    width: 100%;
    height: calc(100vh - 160px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    resize: none;
  }
  .yaml-editor:focus { outline: none; border-color: var(--accent); }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  #toast.ok      { background: var(--accent2); color: #0e1117; }
  #toast.err     { background: var(--danger);  color: #fff; }
  #toast.warning { background: var(--warn);    color: #0e1117; }

  /* ── Loading ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 13px;
    gap: 10px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Abbrev Table ── */
  .abbrev-table { width: 100%; border-collapse: collapse; }
  .abbrev-table th {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--muted); text-transform: uppercase;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .abbrev-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  .abbrev-table tr:hover td { background: var(--surface2); }
  .abbrev-table input { width: 100%; }
  .del-row {
    cursor: pointer; color: var(--muted); font-size: 16px;
    background: none; border: none; padding: 4px;
  }
  .del-row:hover { color: var(--danger); }
  .add-row-btn {
    margin-top: 10px;
    font-size: 12px;
    color: var(--accent);
    background: none;
    border: 1px dashed rgba(79,142,247,0.4);
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .add-row-btn:hover { background: rgba(79,142,247,0.08); }

  .badge {
    display: inline-block;
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 3px;
    font-family: var(--mono);
  }
  /* ── Home ── */
  .home-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 32px; gap: 32px;
  }
  .home-logo-ring {
    position: relative; width: 120px; height: 120px;
  }
  .home-logo-ring svg { position: absolute; top: 0; left: 0; }
  .home-logo-inner {
    position: absolute; inset: 16px;
    background: linear-gradient(135deg, #1e2d50 0%, #0e1117 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 22px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.05em;
  }
  .home-title {
    text-align: center;
  }
  .home-title h2 {
    font-size: 28px; font-weight: 300; color: var(--text);
    letter-spacing: 0.04em; margin-bottom: 6px;
  }
  .home-title h2 strong { font-weight: 600; color: var(--accent); }
  .home-title p {
    font-size: 13px; color: var(--muted); max-width: 480px; line-height: 1.6;
  }
  .home-grid {
    display: grid; grid-template-columns: repeat(2, 240px);
    gap: 12px;
  }
  .home-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px;
  }
  .home-card:hover {
    border-color: rgba(79,142,247,0.5);
    background: rgba(79,142,247,0.05);
    transform: translateY(-1px);
  }
  .home-card-icon { font-size: 22px; line-height: 1; }
  .home-card-label { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .home-card-sub   { font-size: 11px; color: var(--muted); }
  .home-version {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px;
  }

  /* ── Markdown ── */
  .md-wrap {
    max-width: 820px; padding: 8px 4px;
    font-size: 14px; line-height: 1.75; color: var(--text);
  }
  .md-wrap h1 {
    font-size: 22px; font-weight: 600; color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px; margin: 28px 0 16px;
  }
  .md-wrap h2 {
    font-size: 17px; font-weight: 600; color: var(--accent);
    margin: 24px 0 12px;
  }
  .md-wrap h3 {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin: 18px 0 8px;
  }
  .md-wrap h4 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  .md-wrap p  { margin: 0 0 12px; }
  .md-wrap ul, .md-wrap ol { margin: 0 0 12px; padding-left: 22px; }
  .md-wrap li { margin-bottom: 4px; }
  .md-wrap code {
    font-family: var(--mono); font-size: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 3px; color: var(--accent2);
  }
  .md-wrap pre {
    background: #0a0e18; border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px; margin: 10px 0 16px;
    overflow-x: auto;
  }
  .md-wrap pre code {
    background: none; border: none; padding: 0;
    font-size: 12px; color: #c9d1d9; line-height: 1.6;
  }
  .md-wrap table {
    width: 100%; border-collapse: collapse; margin: 12px 0 16px;
    font-size: 13px;
  }
  .md-wrap th {
    padding: 8px 12px; text-align: left; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .md-wrap td {
    padding: 8px 12px; border: 1px solid var(--border);
  }
  .md-wrap tr:hover td { background: rgba(255,255,255,0.02); }
  .md-wrap blockquote {
    border-left: 3px solid var(--accent); margin: 0 0 12px;
    padding: 6px 16px; background: rgba(79,142,247,0.05);
    color: var(--muted); font-style: italic;
  }
  .md-wrap hr {
    border: none; border-top: 1px solid var(--border); margin: 24px 0;
  }
  .md-wrap a { color: var(--accent); text-decoration: none; }
  .md-wrap a:hover { text-decoration: underline; }
  .md-notice {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; margin-bottom: 16px;
    background: rgba(124,141,166,0.1); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; color: var(--muted);
  }

  /* ── Reports ── */
  .report-wrap { display: flex; flex-direction: column; height: 100%; }
  .report-tabs {
    display: flex; gap: 2px; padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .report-tab {
    padding: 10px 16px; font-size: 12px; font-weight: 500;
    font-family: var(--sans); cursor: pointer;
    background: transparent; color: var(--muted); border: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s; white-space: nowrap;
  }
  .report-tab:hover { color: var(--text); }
  .report-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .report-tab .rtab-icon { margin-right: 6px; }

  .report-panel {
    flex: 1; display: flex; flex-direction: column;
    padding: 20px 24px; overflow: hidden;
  }
  .report-controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .report-controls input[type=text] {
    width: 220px;
  }
  .report-output-wrap {
    flex: 1; overflow-y: auto;
    background: #0a0e18; border: 1px solid var(--border);
    border-radius: 6px; padding: 16px;
    font-family: var(--mono); font-size: 12px;
    line-height: 1.7; color: #c9d1d9;
    min-height: 200px;
  }
  .report-output-wrap.loading-state {
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  /* ANSI-Farben im Terminal-Output */
  .ro-green  { color: #64d9a8; }
  .ro-blue   { color: #4f8ef7; }
  .ro-yellow { color: #f7c44f; }
  .ro-red    { color: #f76f6f; }
  .ro-muted  { color: #7c8da6; }
  .ro-bold   { font-weight: 600; color: #e2e8f0; }
  .ro-sep    { color: #2a3348; }

  .report-meta {
    display: flex; align-items: center; gap: 12px;
    margin-top: 10px; font-size: 11px; color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); display: inline-block;
  }
  .status-dot.ok      { background: var(--accent2); box-shadow: 0 0 5px var(--accent2); }
  .status-dot.err     { background: var(--danger);  box-shadow: 0 0 5px var(--danger); }
  .status-dot.running { background: var(--warn);
    animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .badge-law   { background: rgba(100,217,168,0.15); color: var(--accent2); }
  .badge-inst  { background: rgba(79,142,247,0.15);  color: var(--accent); }
  .badge-other { background: rgba(124,141,166,0.15); color: var(--muted); }

  /* ── Sub-Tabs ── */
  .sub-tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .sub-tab {
    padding: 8px 18px;
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .sub-tab:hover { color: var(--text); }
  .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Synonym-Karten ── */
  .syn-cards { display: flex; flex-direction: column; gap: 12px; }
  .syn-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.15s;
    position: relative;
  }
  .syn-card:hover { border-color: rgba(79,142,247,0.4); }
  .syn-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .syn-canonical-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .syn-canonical-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .syn-canonical-input {
    flex: 1;
    font-weight: 500;
    font-size: 14px !important;
    color: var(--accent2) !important;
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid var(--border) !important;
    border-radius: 0 !important;
    padding: 4px 2px !important;
  }
  .syn-canonical-input:focus {

// ── Einfacher Markdown-Renderer ───────────────────────────────────────────
function mdToHtml(md) {
  // Code-Blöcke zuerst extrahieren und ersetzen
  const blocks = [];
  let h = md.replace(/```[\w\s]*\n?([\s\S]*?)```/g, (_, c) => {
    blocks.push(c.trim());
    return `%%BLOCK${blocks.length - 1}%%`;
  });

  // Inline-Code
  const inlines = [];
  h = h.replace(/`([^`\n]+)`/g, (_, c) => {
    inlines.push(c);
    return `%%INLINE${inlines.length - 1}%%`;
  });

  // Überschriften
  h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm,  '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,   '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,    '<h1>$1</h1>');

  // Trennlinie
  h = h.replace(/^---+$/gm, '<hr>');

  // Fett + Kursiv
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Tabellen
  h = h.replace(/^(\|.+\|)\n\|[-| :]+\|\n((?:\|.+\|?\n?)+)/gm, (_, hdr, body) => {
    const ths = hdr.split('|').filter(c => c.trim())
      .map(c => `<th>${c.trim()}</th>`).join('');
    const trs = body.trim().split('\n').filter(r => r.trim()).map(row => {
      const tds = row.split('|').filter(c => c.trim())
        .map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // Listen
  h = h.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

  // Nummerierte Listen
  h = h.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
  h = h.replace(/(<oli>[\s\S]*?<\/oli>\n?)+/g, m =>
    `<ol>${m.replace(/<oli>/g,'<li>').replace(/<\/oli>/g,'</li>')}</ol>`);

  // Blockquote
  h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Absätze (Zeilen ohne HTML-Tag)
  h = h.replace(/^(?!<[a-zA-Z\/])(.+)$/gm, '<p>$1</p>');

  // Code-Blöcke zurückeinsetzen
  h = h.replace(/%%BLOCK(\d+)%%/g, (_, i) =>
    `<pre><code>${escHtml(blocks[parseInt(i)])}</code></pre>`);

  // Inline-Code zurückeinsetzen
  h = h.replace(/%%INLINE(\d+)%%/g, (_, i) =>
    `<code>${escHtml(inlines[parseInt(i)])}</code>`);

  return h;
}

  const tabs = REPORTS.map(r => `

  stopAutoRefresh();
  activeReport = key;
  renderReportPage();

async function runReport() {
  const rep = REPORTS.find(r => r.key === activeReport);
  const btn = document.getElementById('btn-run');
  const out = document.getElementById('report-output');
  const dot = document.getElementById('report-dot');
  const sta = document.getElementById('report-status');
  const tim = document.getElementById('report-time');
  if (!out) return;

  const urlParams = new URLSearchParams();
  (rep.params || []).forEach(p => {
    if (p.type === 'toggle') {
      if (document.getElementById(p.id)?.checked) urlParams.set(p.param,'true');
    } else {
      const v = document.getElementById(p.id)?.value?.trim();
      if (v) urlParams.set(p.param, v);
    }
  });
  const url = rep.endpoint + (urlParams.toString() ? '?' + urlParams : '');

  btn.disabled = true; btn.textContent = '⏳ Läuft...';
  out.className = 'report-output-wrap';
  out.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:20px;color:var(--muted)"><div class="spinner"></div> Daten werden geladen...</div>';
  dot.className = 'status-dot running';
  sta.textContent = 'Läuft...';
  const t0 = Date.now();

  try {
    const data = await apiFetch(url);
    const elapsed = ((Date.now()-t0)/1000).toFixed(1);
    out.innerHTML = renderReportData(rep.key, data);
    dot.className   = 'status-dot ok';
    sta.textContent = 'Erfolgreich';
    tim.textContent = `${elapsed}s · ${new Date().toLocaleTimeString('de-DE')}`;
  } catch(e) {
    out.innerHTML   = `<div style="padding:20px;color:var(--danger)">Fehler: ${escHtml(e.message)}</div>`;
    dot.className   = 'status-dot err';
    sta.textContent = 'Fehler';
  } finally {
    btn.disabled = false; btn.textContent = '▶ Ausführen';
  }
}

// ── Tabellenrenderer ──────────────────────────────────────────────────────────
// Konvertiert ISO-UTC-String in lokale Zeitdarstellung
function utcToLocal(isoStr, withDate=true) {
  if (!isoStr) return '–';
  try {
    const d = new Date(isoStr);
    if (withDate)
      return d.toLocaleDateString('de-DE') + ' ' +
             d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    return d.toLocaleDateString('de-DE') + ' ' +
           d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  } catch { return isoStr; }
}

function tbl(cols, rows, opts={}) {
  const ths = cols.map(c=>`<th>${c}</th>`).join('');
  const trs = rows.map(r=>`<tr>${r.map((c,i)=>`<td>${c??''}</td>`).join('')}</tr>`).join('');
  return `<table class="abbrev-table" style="margin-bottom:20px">`+
    `<thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

function kpiRow(label, value, target, unit='', ok) {
  const icon = ok===undefined?'': ok?'<span style="color:var(--accent2)">✅</span>':'<span style="color:var(--warn)">⚠️</span>';
  const tgt = target!==undefined?`<span style="color:var(--muted);font-size:11px"> (Ziel: ${target}${unit})</span>`:'';
  return `<tr><td>${label}</td><td><strong>${value}${unit}</strong>${tgt}</td><td>${icon}</td></tr>`;
}

function sec(title, content) {
  return `<div class="section"><div class="section-title">${title}</div>${content}</div>`;
}

function pct_bar(pct) {
  const p = Math.min(100, Math.max(0, parseFloat(pct)||0));
  const color = p>=70?'var(--accent2)':p>=40?'var(--warn)':'var(--danger)';
  return `<div style="display:flex;align-items:center;gap:8px">
    <div style="flex:1;height:6px;background:var(--border);border-radius:3px">
      <div style="width:${p}%;height:100%;background:${color};border-radius:3px"></div>
    </div>
    <span style="font-size:11px;color:var(--muted);width:36px">${p}%</span>
  </div>`;
}

function statusBadge(s) {
  const map = {done:'var(--accent2)',error:'var(--danger)',running:'var(--warn)',queued:'var(--muted)'};
  const c = map[s]||'var(--muted)';
  return `<span style="background:${c}22;color:${c};border:1px solid ${c}44;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)">${s}</span>`;
}

function decisionBadge(d) {
  if (!d) return '<span style="color:var(--muted);font-size:11px">—</span>';
  const map = {behalten:'var(--accent2)',verwerfen:'var(--danger)',unklar:'var(--warn)'};
  const c = map[d]||'var(--muted)';
  return `<span style="color:${c};font-size:11px">${d}</span>`;
}

// ── Haupt-Renderer ────────────────────────────────────────────────────────────
function renderReportData(key, data) {
  if (key === 'question')   return renderQuestionReport(data);
  if (key === 'ingest')     return renderIngestReport(data);
  if (key === 'nlp_quality')return renderNlpQualityReport(data);
  if (key === 'nlp_monitor')return renderNlpMonitor(data);
  return '<div style="padding:20px;color:var(--muted)">Kein Renderer verfügbar.</div>';
}

// ── Fragen-Report ─────────────────────────────────────────────────────────────
function renderQuestionReport(d) {
  const s = d.stats || {};
  const statsHtml = `<table class="abbrev-table" style="width:auto;margin-bottom:20px">
    <thead><tr><th>Kennzahl</th><th>Anzahl</th></tr></thead>
    <tbody>
      ${kpiRow('Gesamt',  s.gesamt,  undefined)}
      ${kpiRow('Offen',   s.offen,   0, '', s.offen===0)}
      ${kpiRow('Behalten',s.behalten,undefined)}
      ${kpiRow('Verworfen',s.verworfen,undefined)}
      ${kpiRow('Unklar',  s.unklar,  undefined)}
    </tbody></table>`;

  const typenHtml = tbl(['Typ','Anzahl'],
    (d.typen||[]).map(r=>[r.typ, r.anzahl]));

  const fragenHtml = tbl(
    ['ID','Dokument','Kl.','Typ','Frage','Kontext vorher','Kontext nachher','Abschnitt','Entscheidung'],
    (d.fragen||[]).map(r=>[
      `<span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${r.id.substring(0,8)}</span>`,
      escHtml(r.dokument),
      r.klasse,
      `<span style="color:var(--accent);font-size:11px">${r.typ}</span>`,
      `<span style="color:var(--text)">${escHtml(r.frage)}</span>`,
      r.kontext_vor ? `<span style="color:var(--muted);font-size:11px">...${escHtml(r.kontext_vor)}</span>` : '',
      r.kontext_nach ? `<span style="color:var(--muted);font-size:11px">${escHtml(r.kontext_nach)}...</span>` : '',
      `<span style="font-size:11px;color:var(--muted)">${escHtml(r.abschnitt)}</span>`,
      decisionBadge(r.entscheidung),
    ])
  );

  return sec('Statistik', statsHtml + sec('Typen', typenHtml)) +
         sec(`Fragen (${(d.fragen||[]).length})`, fragenHtml);
}

// ── Ingest-Report ─────────────────────────────────────────────────────────────
function renderIngestReport(d) {
  const jobsHtml = tbl(
    ['Datei','Status','Klasse','Chunks','Dauer','Gestartet'],
    (d.jobs||[]).map(r=>[
      escHtml(r.filename),
      statusBadge(r.status),
      r.doc_class||'–',
      r.chunk_count||0,
      r.dauer ? r.dauer+'s' : '–',
      utcToLocal(r.started_at),
    ])
  );

  const docsHtml = tbl(
    ['Dokument','Typ','Klasse','Chunks','Embeddings','Abkürzungen','Tokens'],
    (d.dokumente||[]).map(r=>[
      escHtml(r.title),
      r.source_type,
      r.klasse||'–',
      r.chunks||0,
      `${r.mit_emb||0}/${r.chunks||0} `+pct_bar(r.chunks?(r.mit_emb||0)/(r.chunks)*100:0),
      r.abbrev_anzahl||0,
      (r.tokens||0).toLocaleString('de'),
    ])
  );

  const typenHtml = tbl(
    ['Klasse','Chunk-Typ','Anzahl','Ø Token'],
    (d.chunk_typen||[]).map(r=>[r.doc_class, r.chunk_type, r.anzahl, r.avg_tokens])
  );

  const abbrevHtml = (d.abkuerzungen||[]).length > 0
    ? tbl(['Abkürzung','Label','In Chunks'],
        (d.abkuerzungen||[]).map(r=>[
          `<strong style="color:var(--accent2)">${escHtml(r.abkuerzung)}</strong>`,
          `<span style="font-size:11px;color:var(--muted)">${r.label}</span>`,
          r.in_chunks,
        ]))
    : '<p style="color:var(--muted);font-size:13px">Keine Abkürzungen aufgelöst.</p>';

  return sec('Jobs', jobsHtml) +
         sec('Dokumente', docsHtml) +
         sec('Chunk-Typen', typenHtml) +
         sec('Aufgelöste Abkürzungen', abbrevHtml);
}

// ── NLP-Qualitätsbericht ──────────────────────────────────────────────────────
function renderNlpQualityReport(d) {
  const svo = d.svo || {};
  const normtypen = d.normtypen || [];
  const unknownPct = normtypen.find(r=>r.norm_type==='UNKNOWN')?.prozent||0;

  // ── 1. Überblick ────────────────────────────────────────────────────────────
  const ueberblickHtml = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px">
      ${[
        ['SVOs gesamt',    svo.gesamt||0,    ''],
        ['NER-Entitäten',  d.ner_gesamt||0,  ''],
        ['NLP-Abdeckung',  (d.abdeckung_svo||0)+'%', ''],
      ].map(([l,v,u])=>`
        <div style="background:var(--surface2);border:1px solid var(--border);
          border-radius:6px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:600;color:var(--accent)">${v}${u}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${l}</div>
        </div>`).join('')}
    </div>`;

  // ── 2. KPI-Tabelle ──────────────────────────────────────────────────────────
  const kpiHtml = `<table class="abbrev-table" style="width:auto;margin-bottom:8px">
    <thead><tr><th>Kennzahl</th><th>Wert</th><th>Ziel</th><th>Status</th></tr></thead>
    <tbody>
      ${kpiRow('UNKNOWN-Rate',        unknownPct+'%',        '< 20%',  '', parseFloat(unknownPct)<20)}
      ${kpiRow('Mit Subjekt',         svo.subj_pct+'%',      '> 80%',  '', (svo.subj_pct||0)>80)}
      ${kpiRow('Mit Objekt',          svo.obj_pct+'%',       '> 60%',  '', (svo.obj_pct||0)>60)}
      ${kpiRow('Vollständig (S+V+O)', svo.full_pct+'%',      '> 50%',  '', (svo.full_pct||0)>50)}
      ${kpiRow('Pronomen als Subjekt',svo.pronomen_pct+'%',  '< 15%',  '', (svo.pronomen_pct||0)<15)}
      ${kpiRow('Ø SVO-Konfidenz',     svo.avg_conf,          '> 0.65', '', (svo.avg_conf||0)>0.65)}
      ${kpiRow('Ø Normtyp-Konfidenz', svo.avg_norm_conf,     '> 0.75', '', (svo.avg_norm_conf||0)>0.75)}
      ${kpiRow('Flair-Anteil NER',    (d.flair_pct||0)+'%',  '> 40%',  '', (d.flair_pct||0)>40)}
    </tbody></table>`;

  // ── 3. Normtypen ────────────────────────────────────────────────────────────
  const normtypenHtml = tbl(
    ['Normtyp','Anzahl','Anteil','Ø Konfidenz'],
    normtypen.map(r=>[
      `<strong style="color:${r.norm_type==='UNKNOWN'?'var(--warn)':'var(--accent)'}">
        ${r.norm_type}</strong>`,
      r.anzahl,
      pct_bar(r.prozent),
      r.avg_conf,
    ])
  );

  // ── 4. SVO-Vollständigkeit ──────────────────────────────────────────────────
  const subjHtml = tbl(
    ['Subjekt','Typ','Häufigkeit'],
    (d.top_subjekte||[]).map(r=>[
      escHtml(r.subject),
      `<span style="font-size:11px;color:var(--muted)">${r.subject_type||'–'}</span>`,
      r.cnt,
    ])
  );
  const objHtml = tbl(
    ['Objekt','Typ','Häufigkeit'],
    (d.top_objekte||[]).map(r=>[
      escHtml(r.object),
      `<span style="font-size:11px;color:var(--muted)">${r.object_type||'–'}</span>`,
      r.cnt,
    ])
  );

  // ── 5. NER ──────────────────────────────────────────────────────────────────
  const flair_cnt = (d.ner_stats||[]).filter(r=>r.source==='flair')
                      .reduce((s,r)=>s+r.anzahl,0);
  const rule_cnt  = (d.ner_stats||[]).filter(r=>r.source==='rule')
                      .reduce((s,r)=>s+r.anzahl,0);
  const total_ner = flair_cnt + rule_cnt || 1;

  const nerUeberblick = `
    <div style="display:flex;gap:20px;margin-bottom:12px;font-size:12px">
      <span>🤖 Flair: <strong>${flair_cnt}</strong>
        (${(flair_cnt/total_ner*100).toFixed(1)}%)</span>
      <span>📏 Regelbasiert: <strong>${rule_cnt}</strong>
        (${(rule_cnt/total_ner*100).toFixed(1)}%)</span>
    </div>`;

  const nerHtml = nerUeberblick + tbl(
    ['Label','Quelle','Anzahl','Ø Konfidenz'],
    (d.ner_stats||[]).map(r=>[
      `<strong>${r.label}</strong>`,
      `<span style="font-size:11px">${r.source==='flair'?'🤖 Flair':'📏 Regel'}</span>`,
      r.anzahl,
      r.avg_conf,
    ])
  );
  const topNerHtml = tbl(
    ['Entität','Label','Quelle','Häufigkeit','Ø Konf.'],
    (d.top_ner||[]).map(r=>[
      `<strong>${escHtml(r.text)}</strong>`,
      r.label,
      r.source==='flair'?'🤖':'📏',
      r.cnt,
      r.avg_conf,
    ])
  );

  // ── 6. Handlungsempfehlungen ────────────────────────────────────────────────
  const empfehlungen = [];
  if (parseFloat(unknownPct) > 20)
    empfehlungen.push({icon:'⚠️', titel:'UNKNOWN-Rate hoch',
      problem: unknownPct+'% der SVOs haben keinen Normtyp',
      massnahme:'nlp_config.yaml → normtypen: Patterns ergänzen'});
  if ((svo.obj_pct||0) < 60)
    empfehlungen.push({icon:'⚠️', titel:'Viele SVOs ohne Objekt',
      problem: (100-(svo.obj_pct||0)).toFixed(1)+'% der SVOs haben kein Objekt',
      massnahme:'nlp_config.yaml → svo.object_deps prüfen'});
  if ((svo.subj_pct||0) < 80)
    empfehlungen.push({icon:'⚠️', titel:'Viele SVOs ohne Subjekt',
      problem: (100-(svo.subj_pct||0)).toFixed(1)+'% der SVOs haben kein Subjekt',
      massnahme:'nlp_config.yaml → svo.stop_subjects prüfen'});
  if ((d.flair_pct||0) < 40)
    empfehlungen.push({icon:'⚠️', titel:'Flair-Anteil niedrig',
      problem: 'Nur '+(d.flair_pct||0).toFixed(1)+'% der NER-Entitäten von Flair',
      massnahme:'nlp_config.yaml → ner.flair_min_confidence senken'});

  const empfHtml = empfehlungen.length === 0
    ? '<div style="color:var(--accent2);padding:8px">✅ Alle Zielwerte erreicht.</div>'
    : empfehlungen.map(e=>`
        <div style="border:1px solid var(--warn);border-radius:6px;
          padding:12px;margin-bottom:8px;background:rgba(247,196,79,0.05)">
          <div style="font-weight:500;margin-bottom:4px">${e.icon} ${e.titel}</div>
          <div style="font-size:12px;color:var(--muted)">Problem: ${e.problem}</div>
          <div style="font-size:12px;color:var(--accent);margin-top:2px">
            → ${e.massnahme}</div>
        </div>`).join('');

  return sec('1. Überblick', ueberblickHtml + kpiHtml) +
         sec('2. Normtyp-Verteilung', normtypenHtml) +
         sec('3. Top Subjekte', subjHtml) +
         sec('4. Top Objekte', objHtml) +
         sec('5. NER – Qualität', nerHtml) +
         sec('6. Top NER-Entitäten', topNerHtml) +
         sec('7. Handlungsempfehlungen', empfHtml);
}

function clearOutput() {
  const out = document.getElementById('report-output');
  if (out) {
    out.className = 'report-output-wrap loading-state';
    out.innerHTML = '<span style="color:var(--muted)">Ausgabe geleert.</span>';
  }
  stopAutoRefresh();
  const btn = document.getElementById('btn-autorefresh');
  if (btn) btn.classList.remove('btn-primary');
}

// ── Auto-Refresh ─────────────────────────────────────────────────────────────
let autoRefreshActive = false;

function toggleAutoRefresh() {
  autoRefreshActive = !autoRefreshActive;
  const btn = document.getElementById('btn-autorefresh');
  const rep = REPORTS.find(r => r.key === activeReport);

  if (autoRefreshActive) {
    btn?.classList.add('btn-primary');
    btn?.classList.remove('btn-ghost');
    runReport();
    reportRefreshId = setInterval(runReport, (rep.refreshSecs || 10) * 1000);
  } else {
    stopAutoRefresh();
    btn?.classList.remove('btn-primary');
    btn?.classList.add('btn-ghost');
  }
}

function stopAutoRefresh() {
  if (reportRefreshId) {
    clearInterval(reportRefreshId);
    reportRefreshId = null;
  }
  autoRefreshActive = false;
}

// ── Terminal-Output formatieren ───────────────────────────────────────────────
function formatOutput(text) {
  if (!text) return '<span class="ro-muted">Keine Ausgabe</span>';

  return text
    .split('\n')
    .map(line => {
      const e = escHtml(line);

      // Trennlinien
      if (/^[=─]+$/.test(line.trim()))
        return `<span class="ro-sep">${e}</span>`;

      // Erfolgs-Icons
      if (line.includes('✅') || line.includes('✓'))
        return `<span class="ro-green">${e}</span>`;

      // Warn-Icons
      if (line.includes('⚠️') || line.includes('⚠'))
        return `<span class="ro-yellow">${e}</span>`;

      // Fehler-Icons
      if (line.includes('❌') || line.includes('✗'))
        return `<span class="ro-red">${e}</span>`;

      // Sektion-Überschriften (eingerückt + Großbuchstaben)
      if (/^\s+\d+\./.test(line) || /^\s{2}[A-ZÄÖÜ]/.test(line))
        return `<span class="ro-bold">${e}</span>`;

      // Info-Zeilen mit Prozent
      if (line.includes('%') && line.includes('Ziel'))
        return `<span class="ro-blue">${e}</span>`;

      // Zahlen-Zeilen (KPI-Werte)
      if (/^\s+──/.test(line))
        return `<span class="ro-muted">${e}</span>`;

      return e;
    })
    .join('\n');
}

// ── Render ────────────────────────────────────────────────────────────────────
function setView(mode) {
  viewMode = mode;
  document.getElementById('vbtn-form').classList.toggle('active', mode === 'form');
  document.getElementById('vbtn-raw').classList.toggle('active',  mode === 'raw');
  renderContent();
}

function renderContent() {
  if (!current || !configs[current]) return;
  const cfg = configs[current];
  if (viewMode === 'raw') {
    renderRaw();
  } else {
    renderForm(current, cfg.content);
  }
}

// ── Raw YAML ──────────────────────────────────────────────────────────────────
function renderRaw() {
  document.getElementById('content').innerHTML =
    `<textarea class="yaml-editor" id="yaml-raw" spellcheck="false">${escHtml(rawYaml)}</textarea>`;
  document.getElementById('yaml-raw').addEventListener('input', e => {
    rawYaml = e.target.value;
    unsaved = true;
  });
}

// ── Form Renderers ─────────────────────────────────────────────────────────────
function renderForm(name, data) {
  const el = document.getElementById('content');
  if      (name === 'nlp')          el.innerHTML = renderNlpForm(data);
  else if (name === 'embedder')     el.innerHTML = renderEmbedderForm(data);
  else if (name === 'abbrev')       el.innerHTML = renderAbbrevForm(data);
  else if (name === 'chunker') el.innerHTML = renderTestChunkerForm(data);
  else if (name === 'docs')         el.innerHTML = renderDocsForm(data);
  else                              el.innerHTML = renderGenericForm(data);
  attachFormListeners(name, data);
}

function field(label, help, input) {
  return `<div class="field-row">
    <div><div class="field-label">${label}</div><div class="field-help">${help}</div></div>
    <div>${input}</div>
  </div>`;
}

function toggle(id, label, help, checked) {
  return `<div class="field-row">
    <div><div class="field-label">${label}</div><div class="field-help">${help}</div></div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="${id}" ${checked?'checked':''} onchange="markDirty()">
        <span class="slider"></span>
      </label>
      <span style="font-size:13px;color:var(--muted)" id="${id}-lbl">${checked?'Aktiv':'Inaktiv'}</span>
    </div>
  </div>`;
}

function tagInput(id, values) {
  const tags = (values||[]).map(v =>
    `<span class="tag">${escHtml(v)}<span class="tag-del" onclick="removeTag('${id}','${v}')">×</span></span>`
  ).join('');
  return `<div class="tag-container" id="${id}-container" onclick="focusTag('${id}')">
    ${tags}
    <input class="tag-input" id="${id}-input" placeholder="+ Eingabe + Enter"
      onkeydown="handleTagKey(event,'${id}')" oninput="markDirty()">
  </div>`;
}

// Aktiver Sub-Tab für abbrev: 'abbrev' oder 'synonyms'

  const abbrevs  = d.abbreviations || [];

function switchAbbrevTab(tab) {

        <select class="ab-label" data-i="${i}" onchange="markDirty()">

      <thead><tr>

        <th title="Signalwörter (kommagetrennt). Leer = immer auflösen.">

// ── Synonym-Karten ────────────────────────────────────────────────────────
function renderSynonymCards(synonyms) {
  const LABELS = ['ROLLE','BEHÖRDE','DATENOBJEKT','SONSTIGE'];

  const cards = synonyms.map((s,i) => {
    const variantTags = (s.variants||[]).map(v =>
      `<span class="tag" data-val="${escHtml(v)}">${escHtml(v)}<span class="tag-del" onclick="removeTag('syn-v-${i}','${escHtml(v)}')">×</span></span>`
    ).join('');
    const contextTags = (s.context||[]).map(c =>
      `<span class="tag" data-val="${escHtml(c)}">${escHtml(c)}<span class="tag-del" onclick="removeTag('syn-c-${i}','${escHtml(c)}')">×</span></span>`
    ).join('');
    const lbl = s.label || 'SONSTIGE';

    return `
    <div class="syn-card" id="syn-card-${i}">
      <button class="syn-card-del" onclick="deleteSynonym(${i})" title="Synonym löschen">×</button>

      <div class="syn-card-header">
        <div class="syn-canonical-wrap">
          <span class="syn-canonical-label">Normalform</span>
          <input type="text" class="syn-canonical-input syn-canonical"
            data-i="${i}"
            value="${escHtml(s.canonical||'')}"
            placeholder="Normalform eingeben..."
            onchange="markDirty()">
        </div>
        <span class="syn-count">#${i+1}</span>
      </div>

      <div class="syn-card-body">
        <div>
          <div class="syn-field-label">Varianten <span style="font-weight:400;text-transform:none;letter-spacing:0">(Enter zum Hinzufügen)</span></div>
          <div class="tag-container" id="syn-v-${i}-container" onclick="focusTag('syn-v-${i}')">
            ${variantTags}
            <input class="tag-input" id="syn-v-${i}-input"
              placeholder="Variante eingeben + Enter"
              onkeydown="handleTagKey(event,'syn-v-${i}')"
              oninput="markDirty()">
          </div>
        </div>

        <div class="syn-card-meta">
          <div>
            <div class="syn-field-label">Label</div>
            <select class="syn-label" data-i="${i}"
              style="width:100%"
              onchange="markDirty();updateSynBadge(${i},this.value)">
              ${LABELS.map(l=>`<option ${lbl===l?'selected':''}>${l}</option>`).join('')}
            </select>
            <div style="margin-top:6px">
              <span class="label-badge label-${lbl}" id="syn-lbl-badge-${i}">${lbl}</span>
            </div>
          </div>

          <div>
            <div class="syn-field-label">Kontext</div>
            <div class="tag-container" id="syn-c-${i}-container"
              onclick="focusTag('syn-c-${i}')"
              style="min-height:32px">
              ${contextTags}
              <input class="tag-input" id="syn-c-${i}-input"
                placeholder="Signalwort + Enter"
                onkeydown="handleTagKey(event,'syn-c-${i}')"
                oninput="markDirty()">
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px">
              Leer = immer normalisieren
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const empty = synonyms.length === 0
    ? `<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:13px">
        Noch keine Synonyme – klicke auf "+ Neues Synonym"
       </div>`
    : '';

  return `
  ${renderAbbrevSubTabs('synonyms')}
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
    <p style="font-size:12px;color:var(--muted);flex:1;margin:0">
      Synonyme normalisieren verschiedene Bezeichnungen auf eine Normalform.
      Verbessert die Retrieval-Qualität im RAG.
    </p>
    <input type="text" id="syn-search"
      placeholder="🔍 Synonyme filtern..."
      style="width:200px;font-size:12px"
      oninput="filterSynCards()">
  </div>
  <div class="syn-cards" id="syn-cards">
    ${cards}${empty}
  </div>
  <button class="add-row-btn" style="margin-top:16px" onclick="addSynonym()">
    + Neues Synonym
  </button>`;
}

function updateSynBadge(i, label) {
  const badge = document.getElementById('syn-lbl-badge-'+i);
  if (!badge) return;
  badge.textContent = label;
  badge.className = 'label-badge label-' + label;
}

function filterSynCards() {
  const q = (document.getElementById('syn-search')?.value || '').toLowerCase();
  document.querySelectorAll('.syn-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

function addSynonym() {
  const d = configs[current].content;
  d.synonyms = d.synonyms || [];
  d.synonyms.push({canonical:'',variants:[],label:'ROLLE',context:[]});
  markDirty();
  renderContent();
  // Zu neuer Karte scrollen
  setTimeout(() => {
    const cards = document.querySelectorAll('.syn-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({behavior:'smooth'});
  }, 100);
}

function deleteSynonym(i) {
  configs[current].content.synonyms.splice(i,1);
  markDirty();
  renderContent();
}

function addAbbrev() {
  const d = configs[current].content;
  d.abbreviations = d.abbreviations || [];
  d.abbreviations.push({abbrev:'',resolved:'',label:'GESETZ',context:[]});
  markDirty();
  renderContent();
}
function deleteAbbrev(i) {
  configs[current].content.abbreviations.splice(i,1);
  markDirty();
  renderContent();
}

function renderChunkTypenSection(d) {
  const chunk_typen = d.chunk_typen || {};
  const OPTS = 'tatbestand,rechtsfolge,definition,ausnahme,verweis,zustaendigkeit,deadline,anforderung,tabelle,text'.split(',');
  let rows = '';
  Object.entries(chunk_typen).forEach(([name, entry], i) => {
    const ct  = entry.chunk_type || 'tatbestand';
    const pat = (entry.patterns || []).join('\n');
    const opts = OPTS.map(t => '<option'+(ct===t?' selected':'')+'>'+t+'</option>').join('');
    rows += '<tr>'
      + '<td><input type="text" class="ct-name" data-i="'+i+'"'
      + ' value="'+escHtml(name)+'" style="font-family:var(--mono);font-size:11px"'
      + ' onchange="markDirty()"></td>'
      + '<td><select class="ct-chunk-type" data-i="'+i+'" onchange="markDirty()">'
      + opts + '</select></td>'
      + '<td><textarea class="ct-patterns" data-i="'+i+'" rows="3"'
      + ' style="width:100%;font-size:11px;min-height:60px"'
      + ' onchange="markDirty()">'+escHtml(pat)+'</textarea></td>'
      + '<td><button class="del-row" onclick="deleteChunkTyp('+i+')">×</button></td>'
      + '</tr>';
  });
  return '<div class="section">'
    + '<div class="section-title">Chunk-Typ-Erkennung (Klasse A)</div>'
    + '<p style="font-size:12px;color:var(--muted);margin-bottom:12px">'
    + 'Patterns in Reihenfolge geprüft – erstes Match gewinnt. '
    + 'Fallback: <code>tatbestand</code>. Ein Pattern pro Zeile.</p>'
    + '<table class="abbrev-table">'
    + '<thead><tr><th>Name</th><th>Chunk-Typ</th>'
    + '<th>Patterns (ein Pattern pro Zeile)</th><th></th></tr></thead>'
    + '<tbody id="chunk-typen-tbody">' + rows + '</tbody></table>'
    + '<button class="add-row-btn" onclick="addChunkTyp()">+ Neuer Typ</button>'
    + '</div>';
}

function addChunkTyp() {
  const d = configs[current].content;
  d.chunk_typen = d.chunk_typen || {};
  d.chunk_typen['NEUER_TYP'] = {chunk_type:'tatbestand', patterns:[]};
  markDirty(); renderContent();
}
function deleteChunkTyp(i) {
  const d = configs[current].content;
  const keys = Object.keys(d.chunk_typen || {});
  if (keys[i]) delete d.chunk_typen[keys[i]];
  markDirty(); renderContent();
}

// ── Dokument-Metadaten Formular ──────────────────────────────────────────────
function renderDocsForm(d) {
  const det     = d.doc_type_detection || {};
  const enabled = det.enabled !== false;
  const gconf   = det.global_min_confidence || 0.70;
  const typen   = det.typen || {};

  // Alle Nicht-detection Keys = Dokument-Einträge
  const docs = Object.entries(d)
    .filter(([k]) => k !== 'doc_type_detection')
    .map(([fname, meta]) => ({fname, ...(meta||{})}));

  const SOURCE_TYPES = ['gesetz','verordnung','standard','fachkonzept',
                        'leitfaden','lastenheft','auslegung','text'];

  const docRows = docs.map((doc, i) => `
    <tr class="doc-entry">
      <td><input type="text" class="doc-filename" value="${escHtml(doc.fname)}"
            onchange="markDirty()" style="font-family:var(--mono);font-size:11px"></td>
      <td>
        <select class="doc-source-type" onchange="markDirty()">
          ${SOURCE_TYPES.map(s =>
            `<option ${(doc.source_type||'')==s?'selected':''}>${s}</option>`
          ).join('')}
        </select>
      </td>
      <td><input type="text" class="doc-title" value="${escHtml(doc.title||'')}"
            onchange="markDirty()"></td>
      <td><input type="text" class="doc-jurisdiction"
            value="${escHtml(doc.jurisdiction||'')}" style="width:60px"
            placeholder="z.B. NDS" onchange="markDirty()"></td>
      <td><input type="text" class="doc-version"
            value="${escHtml(doc.version||'')}" style="width:60px"
            onchange="markDirty()"></td>
      <td>
        <select class="doc-force-class" onchange="markDirty()" style="width:70px">
          ${['(auto)','A','B','C'].map(c =>
            `<option ${(doc.force_class||'(auto)')==c?'selected':''}>${c}</option>`
          ).join('')}
        </select>
      </td>
      <td><button class="del-row" onclick="deleteDocEntry(${i})">×</button></td>
    </tr>`).join('');

  // Typen-Übersicht (nur Anzeige, Schwellenwerte editierbar)
  const typenRows = Object.entries(typen).map(([typ, cfg]) => `
    <tr>
      <td><strong style="font-family:var(--mono);color:var(--accent)">${typ}</strong></td>
      <td style="font-size:11px;color:var(--muted)">${cfg.beschreibung||''}</td>
      <td>
        <input type="number" step="0.05" min="0" max="1"
          id="dt-conf-${typ}" value="${cfg.min_confidence??0.70}"
          style="width:70px" onchange="markDirty()">
      </td>
    </tr>`).join('');

  return `
  <div class="section">
    <div class="section-title">Automatische Typ-Erkennung</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Wird verwendet wenn source_type weder per CLI/API noch als Dokument-Eintrag definiert ist.
    </p>
    <div class="field-row">
      <div><div class="field-label">Erkennung aktiv</div>
           <div class="field-help">false = immer "text" als Fallback</div></div>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="dt-enabled" ${enabled?'checked':''}
            onchange="markDirty()">
          <span class="slider"></span>
        </label>
        <span style="font-size:13px;color:var(--muted)" id="dt-enabled-lbl">
          ${enabled?'Aktiv':'Inaktiv'}
        </span>
      </div>
    </div>
    <div class="field-row">
      <div><div class="field-label">Globale Min-Konfidenz</div>
           <div class="field-help">Standard-Schwellenwert für alle Typen</div></div>
      <input type="number" id="dt-global-conf" step="0.05" min="0" max="1"
        value="${gconf}" style="width:100px" onchange="markDirty()">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Min-Konfidenz je Dokumenttyp</div>
    <table class="abbrev-table">
      <thead><tr>
        <th>Typ</th><th>Beschreibung</th><th>Min-Konfidenz</th>
      </tr></thead>
      <tbody>${typenRows}</tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">Dokument-Einträge (${docs.length})</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Explizite Metadaten je Dateiname. Überschreiben die automatische Erkennung (Priorität 2).
    </p>
    <table class="abbrev-table">
      <thead><tr>
        <th>Dateiname</th><th>Source-Type</th><th>Titel</th>
        <th>Jurisdiktion</th><th>Version</th><th>Klasse</th><th></th>
      </tr></thead>
      <tbody id="doc-entries-tbody">${docRows}</tbody>
    </table>
    <button class="add-row-btn" onclick="addDocEntry()">+ Neues Dokument</button>
  </div>`;
}

function addDocEntry() {
  const d = configs[current].content;
  // Leeren Eintrag hinzufügen
  const key = 'neues_dokument.pdf';
  d[key] = {source_type:'gesetz', title:'', jurisdiction:'', version:''};
  markDirty();
  renderContent();
}

function deleteDocEntry(i) {
  const d = configs[current].content;
  const keys = Object.keys(d).filter(k => k !== 'doc_type_detection');
  if (keys[i]) delete d[keys[i]];
  markDirty();
  renderContent();
}

function renderGenericForm(d) {
  return `<div class="section">
    <div class="section-title">YAML-Inhalt</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Für diese Konfiguration ist kein Formular verfügbar. Bitte den YAML-Modus verwenden.
    </p>
  </div>`;
}

// ── Tag Helpers ───────────────────────────────────────────────────────────────
function handleTagKey(e, id) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const val = e.target.value.trim().replace(/,$/, '');
  if (!val) return;
  addTag(id, val);
  e.target.value = '';
  markDirty();
}
function addTag(id, val) {
  const container = document.getElementById(id+'-container');
  if (!container) return;
  const span = document.createElement('span');
  span.className = 'tag';
  span.dataset.val = val;
  span.innerHTML = `${escHtml(val)}<span class="tag-del" onclick="removeTag('${id}','${val}')">×</span>`;
  const input = document.getElementById(id+'-input');
  container.insertBefore(span, input);
}
function removeTag(id, val) {
  const container = document.getElementById(id+'-container');
  if (!container) return;
  container.querySelectorAll('.tag').forEach(t => {
    if (t.dataset.val === val) t.remove();
  });
  markDirty();
}
function getTags(id) {
  const container = document.getElementById(id+'-container');
  if (!container) return [];
  return [...container.querySelectorAll('.tag')].map(t => t.dataset.val);
}
function focusTag(id) {
  document.getElementById(id+'-input')?.focus();
}

// ── Collect Form Data ─────────────────────────────────────────────────────────
function collectFormData(name) {
  const g = id => document.getElementById(id);
  const gv = id => g(id)?.value;
  const gc = id => g(id)?.checked;
  const gn = id => parseFloat(gv(id));
  const gi = id => parseInt(gv(id));

  const orig = configs[name]?.content || {};

  if (name === 'docs') {
    const d = JSON.parse(JSON.stringify(orig));
    const docEntries = {};
    document.querySelectorAll('.doc-entry').forEach(row => {
      const fname = row.querySelector('.doc-filename')?.value?.trim();
      if (!fname) return;
      const entry = {};
      const st = row.querySelector('.doc-source-type')?.value?.trim();
      const ti = row.querySelector('.doc-title')?.value?.trim();
      const ju = row.querySelector('.doc-jurisdiction')?.value?.trim();
      const ve = row.querySelector('.doc-version')?.value?.trim();
      const fc = row.querySelector('.doc-force-class')?.value?.trim();
      if (st) entry.source_type  = st;
      if (ti) entry.title        = ti;
      if (ju) entry.jurisdiction = ju;
      if (ve) entry.version      = ve;
      if (fc && fc !== '(auto)') entry.force_class = fc;
      docEntries[fname] = entry;
    });
    Object.keys(d).forEach(k => { if (k !== 'doc_type_detection') delete d[k]; });
    Object.assign(d, docEntries);
    const det = d.doc_type_detection || {};
    det.enabled = document.getElementById('dt-enabled')?.checked ?? true;
    det.global_min_confidence = parseFloat(
      document.getElementById('dt-global-conf')?.value || '0.70');
    // Typ-spezifische Konfidenzen
    Object.keys(det.typen || {}).forEach(typ => {
      const el = document.getElementById('dt-conf-'+typ);
      if (el && det.typen[typ]) det.typen[typ].min_confidence = parseFloat(el.value);
    });
    d.doc_type_detection = det;
    return d;
  }

    if (name === 'nlp') {
    const d = JSON.parse(JSON.stringify(orig));
    d.spacy = d.spacy || {};
    d.spacy.model      = gv('spacy-model') || d.spacy.model;
    d.spacy.batch_size = gi('spacy-batch') || d.spacy.batch_size;
    d.svo = d.svo || {};
    d.svo.min_confidence           = gn('svo-minconf');
    d.svo.pronoun_confidence_penalty = gn('svo-pronpen');
    d.svo.stop_subjects            = getTags('svo-stopsub');
    d.svo.stop_objects             = getTags('svo-stopobj');
    d.svo.pronouns                 = getTags('svo-pronouns');
    d.ner = d.ner || {};
    d.ner.rules_enabled            = gc('ner-rules');
    d.ner.flair_enabled            = gc('ner-flair');
    d.ner.flair_min_confidence     = gn('ner-flairconf');
    d.ner.combination_strategy     = gv('ner-strategy');
    d.ner.blacklist                = getTags('ner-blacklist');
    d.question_filter = d.question_filter || {};
    d.question_filter.ingest = d.question_filter.ingest || {};
    d.question_filter.ingest.enabled          = gc('qf-ingest-enabled');
    d.question_filter.ingest.action           = gv('qf-ingest-action');
    d.question_filter.ingest.apply_to_classes = getTags('qf-ingest-classes');
    d.question_filter.nlp = d.question_filter.nlp || {};
    d.question_filter.nlp.enabled             = gc('qf-nlp-enabled');
    d.question_filter.nlp.action              = gv('qf-nlp-action');
    d.question_filter.nlp.apply_to_classes    = getTags('qf-nlp-classes');
    d.question_filter.detection = d.question_filter.detection || {};
    d.question_filter.detection.min_length          = gi('qf-minlen');
    d.question_filter.detection.max_length          = gi('qf-maxlen');
    d.question_filter.detection.require_question_mark = gc('qf-reqmark');
    d.question_filter.detection.question_words      = getTags('qf-qwords');
    d.worker = d.worker || {};
    d.worker.chunk_batch_size  = gi('worker-batch');
    d.worker.overwrite_existing = gc('worker-overwrite');
    d.worker.min_token_count   = gi('worker-mintoken');
    return d;
  }

  if (name === 'embedder') {
    const d = JSON.parse(JSON.stringify(orig));
    d.active_model = gv('em-active');
    Object.keys(d.models || {}).forEach(mn => {
      d.models[mn].model_id        = gv(`em-${mn}-id`)  || d.models[mn].model_id;
      d.models[mn].dimensions      = gi(`em-${mn}-dim`) || d.models[mn].dimensions;
      d.models[mn].prefix_query    = gv(`em-${mn}-pq`)  || d.models[mn].prefix_query;
      d.models[mn].prefix_passage  = gv(`em-${mn}-pp`)  || d.models[mn].prefix_passage;
    });
    d.runtime = d.runtime || {};
    d.runtime.batch_size    = gi('rt-batch');
    d.runtime.device        = gv('rt-device');
    d.runtime.cache_enabled = gc('rt-cache');
    d.runtime.cache_max_size = gi('rt-cachemax');
    return d;
  }

  if (name === 'abbrev') {
    const d = JSON.parse(JSON.stringify(orig));
    d.abbreviations = [...document.querySelectorAll('#abbrev-tbody tr')].map(tr => ({
      abbrev:   tr.querySelector('.ab-abbrev')?.value   || '',
      resolved: tr.querySelector('.ab-resolved')?.value || '',
      label:    tr.querySelector('.ab-label')?.value    || 'GESETZ',
      context:  (tr.querySelector('.ab-context')?.value || '')
                  .split(',').map(s=>s.trim()).filter(Boolean),
    }));
    // Synonyme aus Karten-Layout sammeln
    d.synonyms = [...document.querySelectorAll('.syn-canonical')].map((inp,i) => ({
      canonical: inp.value || '',
      variants:  getTags(`syn-v-${i}`),
      label:     document.querySelector(`.syn-label[data-i="${i}"]`)?.value || 'ROLLE',
      context:   getTags(`syn-c-${i}`),
    }));
    return d;
  }

  if (name === 'chunker') {
    const d = JSON.parse(JSON.stringify(orig));
    d.output = d.output || {};
    d.output.limit               = gi('tc-limit');
    d.output.text_preview_length = gi('tc-preview');
    const cls = gv('tc-class');
    d.document = d.document || {};
    d.document.force_class = (cls === '(automatisch)') ? null : cls;
    d.synthetic_tests = { enabled: gc('tc-synthetic') };
    d.chunking = d.chunking || {};
    d.chunking.class_a = {
      token_limit_parent: gi('ca-parent'),
      token_limit_child:  gi('ca-child'),
      token_limit_satz:   gi('ca-satz'),
    };
    d.chunking.class_b = {
      token_limit_parent: gi('cb-parent'),
      token_limit_child:  gi('cb-child'),
      overlap_ratio:      gn('cb-overlap'),
    };
    d.chunking.class_c = {
      token_min:     gi('cc-min'),
      token_max:     gi('cc-max'),
      overlap_ratio: gn('cc-overlap'),
    };
    // Chunk-Typen sammeln
    d.chunk_typen = {};
    document.querySelectorAll('#chunk-typen-tbody tr').forEach((tr, i) => {
      const name     = tr.querySelector('.ct-name')?.value?.trim();
      const ct       = tr.querySelector('.ct-chunk-type')?.value;
      const patterns = (tr.querySelector('.ct-patterns')?.value || '')
        .split('\n').map(s => s.trim()).filter(Boolean);
      if (name) d.chunk_typen[name] = {chunk_type: ct, patterns};
    });
    return d;
  }
  return orig;
}

// ── Listeners ─────────────────────────────────────────────────────────────────
function attachFormListeners(name, data) {
  document.querySelectorAll('.toggle input[type=checkbox]').forEach(cb => {
    const lbl = document.getElementById(cb.id+'-lbl');
    if (lbl) cb.addEventListener('change', () => {
      lbl.textContent = cb.checked ? 'Aktiv' : 'Inaktiv';
    });
  });
  // Synonym-Label-Badge live aktualisieren
  document.querySelectorAll('.syn-label').forEach(sel => {
    sel.addEventListener('change', () => {
      const i     = sel.dataset.i;
      const badge = document.getElementById('syn-lbl-badge-'+i);
      if (badge) {
        badge.className = 'label-badge label-'+sel.value;
        badge.textContent = sel.value;
      }
    });
  });
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveConfig() {
  if (!current) return;
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '⏳ Speichern...';

  try {
    let payload;
    if (viewMode === 'raw') {
      payload = { raw_yaml: rawYaml };
    } else {
      const data = collectFormData(current);
      payload = { content: data };
    }
    const r = await apiFetch(`${API}/${current}`, {
      method: 'PUT',
      body: JSON.stringify(payload),
    });
    unsaved = false;
    showToast('✓ ' + r.message, 'ok');
    await loadConfig(current);
  } catch(e) {
    showToast('Fehler: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Speichern';
  }
}

async function restoreBackup() {
  if (!current) return;
  if (!confirm('Backup wiederherstellen? Aktuelle Änderungen gehen verloren.')) return;
  try {
    const r = await apiFetch(`${API}/${current}/restore`, { method: 'POST' });
    showToast('↩ ' + r.message, 'warning');
    await loadConfig(current);
  } catch(e) {
    showToast('Kein Backup vorhanden.', 'err');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function markDirty() { unsaved = true; }

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('beforeunload', e => {
  if (unsaved) e.returnValue = 'Ungespeicherte Änderungen';
});

init();
</script>
