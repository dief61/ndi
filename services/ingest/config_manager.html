async function runQuery() {
  const queryText = document.getElementById('rag-query-input')?.value?.trim();
  if (!queryText) return;
  const debug = document.getElementById('rag-debug')?.checked ?? true;

  const area = document.getElementById('rag-result-area');
  area.innerHTML = '<div class="loading"><div class="spinner"></div> RAG-Pipeline läuft...</div>';

  try {
    const res = await fetch('/api/v1/rag/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: queryText, debug}),
    });

    if (!res.ok) {
      const txt = await res.text();
      area.innerHTML = `<div style="color:#f75f4f;padding:12px;border:1px solid #f75f4f;
        border-radius:6px">Fehler ${res.status}: ${escHtml(txt)}</div>`;
      return;
    }

    const d = await res.json();
    area.innerHTML = renderQueryResult(queryText, d);

  } catch(e) {
    area.innerHTML = `<div style="color:#f75f4f;padding:12px">Netzwerkfehler: ${escHtml(e.message)}</div>`;
  }
}

function renderQueryResult(query, d) {
  const di        = d.debug_info || {};
  const chunks    = d.chunks || [];
  const tracea    = d.traceability || [];
  const kontext   = d.kontext || '';

  // ── Timing-Badge ─────────────────────────────────────────────────────────
  const timingHtml = di.dauer_ms_gesamt ? `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      ${[
        ['Gesamt',    di.dauer_ms_gesamt],
        ['Transform', di.dauer_ms_transform],
        ['Retrieval', di.dauer_ms_retrieval],
        ['Re-Rank',   di.dauer_ms_reranking],
        ['Assembly',  di.dauer_ms_assembly],
      ].map(([lbl, ms]) => ms !== undefined ? `
        <span style="font-size:11px;padding:3px 8px;border-radius:12px;
          background:rgba(79,142,247,0.1);color:var(--accent)">
          ${lbl}: ${ms}ms
        </span>` : '').join('')}
      <span style="font-size:11px;padding:3px 8px;border-radius:12px;
        background:rgba(100,217,168,0.1);color:#64d9a8">
        ${d.query_typ} | Direktlookup: ${d.direktlookup ? 'ja' : 'nein'}
      </span>
      <span style="font-size:11px;padding:3px 8px;border-radius:12px;
        background:rgba(155,89,247,0.1);color:#9b59f7">
        ${di.chunks_retrieval || 0} → ${di.chunks_final || chunks.length} Chunks
      </span>
    </div>` : '';

  // ── Beste Quellen ─────────────────────────────────────────────────────────
  const chunksHtml = chunks.length === 0 ? '<p style="color:var(--muted)">Keine Chunks gefunden.</p>' :
    chunks.map((c, i) => `
      <div style="border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden">
        <div style="padding:8px 12px;background:rgba(79,142,247,0.06);
          display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
          <div>
            <span style="font-size:11px;font-weight:600;color:var(--accent)">
              #${i+1} ${escHtml(c.praembel)}
            </span>
            ${c.norm_reference ?
              `<span style="font-size:10px;color:var(--muted);margin-left:8px">
                ${escHtml(c.norm_reference)}
              </span>` : ''}
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;padding:2px 6px;border-radius:4px;
              ${c.doc_class==='A' ? 'background:rgba(79,142,247,0.15);color:#4f8ef7' :
                c.doc_class==='B' ? 'background:rgba(100,217,168,0.15);color:#64d9a8' :
                'background:rgba(247,201,79,0.15);color:#f7c94f'}">
              Klasse ${escHtml(c.doc_class)}
            </span>
            <span style="font-size:11px;color:var(--muted)">Score: ${c.score}</span>
          </div>
        </div>
        <div style="padding:10px 12px;font-size:12px;font-family:var(--mono);
          color:var(--text);white-space:pre-wrap;max-height:120px;overflow-y:auto;
          line-height:1.5">
          ${escHtml(cleanDisplayText(c.content).substring(0, 400))}${c.content.length > 400 ? '…' : ''}
        </div>
      </div>`).join('');

  // ── Kontext-Vorschau ──────────────────────────────────────────────────────
  const kontextHtml = kontext ? `
    <details style="margin-top:16px">
      <summary style="cursor:pointer;font-size:13px;font-weight:500;
        color:var(--accent);padding:8px 0">
        📄 Assemblierter LLM-Kontext (${kontext.length} Zeichen, ${tracea.length} Quellen)
      </summary>
      <div style="margin-top:8px;padding:12px;border:1px solid var(--border);
        border-radius:6px;font-size:11px;font-family:var(--mono);
        white-space:pre-wrap;max-height:300px;overflow-y:auto;
        background:rgba(0,0,0,0.15);color:var(--text);line-height:1.6">
        ${escHtml(kontext.substring(0, 2000))}${kontext.length > 2000 ? '\n…' : ''}
      </div>
    </details>` : '';

  // ── Traceability ──────────────────────────────────────────────────────────
  const traceHtml = tracea.length ? `
    <details style="margin-top:8px">
      <summary style="cursor:pointer;font-size:13px;font-weight:500;
        color:var(--accent);padding:8px 0">
        🔗 Traceability (${tracea.length} Quellen)
      </summary>
      <div style="margin-top:8px;overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead>
            <tr style="background:rgba(79,142,247,0.08)">
              ${['#','Klasse','Normreferenz','Typ','Score','IM','Quelle'].map(
                h => `<th style="padding:6px 8px;text-align:left;
                  border-bottom:1px solid var(--border);color:var(--muted)">${h}</th>`
              ).join('')}
            </tr>
          </thead>
          <tbody>
            ${tracea.map(t => `
              <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
                <td style="padding:5px 8px">${t.quelle_nr}</td>
                <td style="padding:5px 8px">
                  <span style="padding:1px 5px;border-radius:3px;font-size:10px;
                    ${t.doc_class==='A' ? 'background:rgba(79,142,247,0.15);color:#4f8ef7' :
                      t.doc_class==='B' ? 'background:rgba(100,217,168,0.15);color:#64d9a8' :
                      'background:rgba(247,201,79,0.15);color:#f7c94f'}">
                    ${escHtml(t.doc_class)}
                  </span>
                </td>
                <td style="padding:5px 8px;max-width:200px;overflow:hidden;
                  text-overflow:ellipsis;white-space:nowrap">
                  ${escHtml(t.norm_reference || t.section_path || '–')}
                </td>
                <td style="padding:5px 8px;color:var(--muted)">${escHtml(t.chunk_type||'')}</td>
                <td style="padding:5px 8px">${t.score}</td>
                <td style="padding:5px 8px">${t.im_signals ? '✅' : '–'}</td>
                <td style="padding:5px 8px;color:var(--muted);font-size:10px">
                  ${escHtml(t.retrieval_src||'')}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </details>` : '';

  // ── Debug-Vektoren ────────────────────────────────────────────────────────
  const vektorenArr = (di.transform || di).vektoren || [];
  const vektorHtml  = vektorenArr.length ? `
    <details style="margin-top:8px">
      <summary style="cursor:pointer;font-size:13px;font-weight:500;
        color:var(--accent);padding:8px 0">
        🔍 Query-Vektoren (${vektorenArr.length})
      </summary>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
        ${vektorenArr.map(v => `
          <div style="padding:8px 10px;border:1px solid var(--border);border-radius:4px;
            font-size:11px">
            <span style="font-weight:600;color:var(--accent)">${escHtml(v.strategie)}</span>
            <span style="color:var(--muted);margin:0 8px">Gewicht: ${v.gewicht}</span>
            <span style="font-family:var(--mono);color:var(--text)">${escHtml(v.text)}</span>
          </div>`).join('')}
      </div>
    </details>` : '';

  return `
    <div>
      ${timingHtml}
      <div style="font-size:13px;font-weight:500;margin-bottom:8px">
        📑 Top-Quellen (${chunks.length})
      </div>
      ${chunksHtml}
      ${kontextHtml}
      ${traceHtml}
      ${vektorHtml}
    </div>`;
}

function renderGenericForm(d) {
  return `<div class="section">
    <div class="section-title">YAML-Inhalt</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Für diese Konfiguration ist kein Formular verfügbar. Bitte den YAML-Modus verwenden.
    </p>
  </div>`;
}

// ── Tag Helpers ───────────────────────────────────────────────────────────────
function handleTagKey(e, id) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const val = e.target.value.trim().replace(/,$/, '');
  if (!val) return;
  addTag(id, val);
  e.target.value = '';
  markDirty();
}
function addTag(id, val) {
  const container = document.getElementById(id+'-container');
  if (!container) return;
  const span = document.createElement('span');
  span.className = 'tag';
  span.dataset.val = val;
  span.innerHTML = `${escHtml(val)}<span class="tag-del" onclick="removeTag('${id}','${val}')">×</span>`;
  const input = document.getElementById(id+'-input');
  container.insertBefore(span, input);
}
function removeTag(id, val) {
  const container = document.getElementById(id+'-container');
  if (!container) return;
  container.querySelectorAll('.tag').forEach(t => {
    if (t.dataset.val === val) t.remove();
  });
  markDirty();
}
function getTags(id) {
  const container = document.getElementById(id+'-container');
  if (!container) return [];
  return [...container.querySelectorAll('.tag')]
    .map(t => t.dataset.val)
    .filter(v => v !== undefined && v !== null && v !== '');
}
function focusTag(id) {
  document.getElementById(id+'-input')?.focus();
}

// ── Collect Form Data ─────────────────────────────────────────────────────────
function collectFormData(name) {
  const g = id => document.getElementById(id);
  const gv = id => g(id)?.value;
  const gc = id => g(id)?.checked;
  const gn = id => parseFloat(gv(id));
  const gi = id => parseInt(gv(id));

  const orig = configs[name]?.content || {};

  if (name === 'llm_gateway') {
    const d = JSON.parse(JSON.stringify(orig));
    d.active_provider = document.getElementById('llm-active-provider')?.value || orig.active_provider;
    // Provider-Werte sammeln
    Object.keys(d.providers||{}).forEach(prov => {
      const model   = document.querySelector(`.llm-model[data-prov="${prov}"]`)?.value;
      const apikey  = document.querySelector(`.llm-apikey-env[data-prov="${prov}"]`)?.value;
      const baseurl = document.querySelector(`.llm-base-url[data-prov="${prov}"]`)?.value;
      const tokens  = document.querySelector(`.llm-max-tokens[data-prov="${prov}"]`)?.value;
      const temp    = document.querySelector(`.llm-temperature[data-prov="${prov}"]`)?.value;
      const timeout = document.querySelector(`.llm-timeout[data-prov="${prov}"]`)?.value;
      if (!d.providers[prov]) d.providers[prov] = {};
      if (model   !== undefined) d.providers[prov].model           = model;
      if (apikey  !== undefined) d.providers[prov].api_key_env     = apikey;
      if (baseurl !== undefined) d.providers[prov].base_url        = baseurl;
      if (tokens  !== undefined) d.providers[prov].max_tokens      = parseInt(tokens);
      if (temp    !== undefined) d.providers[prov].temperature     = parseFloat(temp);
      if (timeout !== undefined) d.providers[prov].timeout_sek     = parseInt(timeout);
      const thinking = document.querySelector(`.llm-thinking[data-prov="${prov}"]`)?.value;
      if (thinking && d.providers[prov].thinking_level !== undefined)
        d.providers[prov].thinking_level = thinking;
    });
    d.retry = {
      max_versuche:  parseInt(document.getElementById('llm-retry-max')?.value  || 3),
      wartezeit_sek: parseFloat(document.getElementById('llm-retry-wait')?.value || 2),
    };
    return d;
  }

  if (name === 'docs') {
    const d = JSON.parse(JSON.stringify(orig));
    const docEntries = {};
    document.querySelectorAll('.doc-entry').forEach(row => {
      const fname = row.querySelector('.doc-filename')?.value?.trim();
      if (!fname) return;
      const entry = {};
      const st = row.querySelector('.doc-source-type')?.value?.trim();
      const ti = row.querySelector('.doc-title')?.value?.trim();
      const ju = row.querySelector('.doc-jurisdiction')?.value?.trim();
      const ve = row.querySelector('.doc-version')?.value?.trim();
      const fc = row.querySelector('.doc-force-class')?.value?.trim();
      if (st) entry.source_type  = st;
      if (ti) entry.title        = ti;
      if (ju) entry.jurisdiction = ju;
      if (ve) entry.version      = ve;
      if (fc && fc !== '(auto)') entry.force_class = fc;
      docEntries[fname] = entry;
    });
    Object.keys(d).forEach(k => { if (k !== 'doc_type_detection') delete d[k]; });
    Object.assign(d, docEntries);
    const det = d.doc_type_detection || {};
    det.enabled = document.getElementById('dt-enabled')?.checked ?? true;
    det.global_min_confidence = parseFloat(
      document.getElementById('dt-global-conf')?.value || '0.70');
    // Typ-spezifische Konfidenzen
    Object.keys(det.typen || {}).forEach(typ => {
      const el = document.getElementById('dt-conf-'+typ);
      if (el && det.typen[typ]) det.typen[typ].min_confidence = parseFloat(el.value);
    });
    d.doc_type_detection = det;
    return d;
  }

    if (name === 'nlp') {
    const d = JSON.parse(JSON.stringify(orig));
    d.spacy = d.spacy || {};
    d.spacy.model      = gv('spacy-model') || d.spacy.model;
    d.spacy.batch_size = gi('spacy-batch') || d.spacy.batch_size;
    d.svo = d.svo || {};
    d.svo.min_confidence           = gn('svo-minconf');
    d.svo.pronoun_confidence_penalty = gn('svo-pronpen');
    d.svo.stop_subjects            = getTags('svo-stopsub');
    d.svo.stop_objects             = getTags('svo-stopobj');
    d.svo.pronouns                 = getTags('svo-pronouns');
    d.ner = d.ner || {};
    d.ner.rules_enabled            = gc('ner-rules');
    d.ner.flair_enabled            = gc('ner-flair');
    d.ner.flair_min_confidence     = gn('ner-flairconf');
    d.ner.combination_strategy     = gv('ner-strategy');
    d.ner.blacklist                = getTags('ner-blacklist');
    d.question_filter = d.question_filter || {};
    d.question_filter.ingest = d.question_filter.ingest || {};
    d.question_filter.ingest.enabled          = gc('qf-ingest-enabled');
    d.question_filter.ingest.action           = gv('qf-ingest-action');
    d.question_filter.ingest.apply_to_classes = getTags('qf-ingest-classes');
    d.question_filter.nlp = d.question_filter.nlp || {};
    d.question_filter.nlp.enabled             = gc('qf-nlp-enabled');
    d.question_filter.nlp.action              = gv('qf-nlp-action');
    d.question_filter.nlp.apply_to_classes    = getTags('qf-nlp-classes');
    d.question_filter.detection = d.question_filter.detection || {};
    d.question_filter.detection.min_length          = gi('qf-minlen');
    d.question_filter.detection.max_length          = gi('qf-maxlen');
    d.question_filter.detection.require_question_mark = gc('qf-reqmark');
    d.question_filter.detection.question_words      = getTags('qf-qwords');
    d.worker = d.worker || {};
    d.worker.chunk_batch_size   = gi('worker-batch');
    d.worker.overwrite_existing = gc('worker-overwrite');
    d.worker.min_token_count    = gi('worker-mintoken');
    // agnostische NER-Listen aus Textareas
    const nerCfg = d.ner || {};
    const parseLines = id => (document.getElementById(id)?.value||'')
      .split('\n').map(l=>l.trim()).filter(Boolean);
    nerCfg.agnostische_datenobjekte = parseLines('ner-agnostisch');
    nerCfg.persistenz_praedikate    = parseLines('ner-persistenz');
    nerCfg.attribut_praedikate      = parseLines('ner-attribut');
    d.ner = nerCfg;

    d.llm_normtyp = d.llm_normtyp || {};
    d.llm_normtyp.enabled          = gc('llm-norm-enabled');
    d.llm_normtyp.batch_size       = gi('llm-norm-batch');
    d.llm_normtyp.min_confidence   = parseFloat(document.getElementById('llm-norm-conf')?.value || 0.75);
    d.llm_normtyp.test_max_batches = gi('llm-norm-maxbatches');
    d.llm_normtyp.delay_sek        = parseFloat(document.getElementById('llm-norm-delay')?.value || 1.0);
    d.llm_normtyp.log_prompts      = document.getElementById('llm-norm-log')?.checked ?? true;
    return d;
  }

  if (name === 'embedder') {
    const d = JSON.parse(JSON.stringify(orig));
    d.active_model = gv('em-active');
    Object.keys(d.models || {}).forEach(mn => {
      d.models[mn].model_id        = gv(`em-${mn}-id`)  || d.models[mn].model_id;
      d.models[mn].dimensions      = gi(`em-${mn}-dim`) || d.models[mn].dimensions;
      d.models[mn].prefix_query    = gv(`em-${mn}-pq`)  || d.models[mn].prefix_query;
      d.models[mn].prefix_passage  = gv(`em-${mn}-pp`)  || d.models[mn].prefix_passage;
    });
    d.runtime = d.runtime || {};
    d.runtime.batch_size    = gi('rt-batch');
    d.runtime.device        = gv('rt-device');
    d.runtime.cache_enabled = gc('rt-cache');
    d.runtime.cache_max_size = gi('rt-cachemax');
    return d;
  }

  if (name === 'abbrev') {
    const d = JSON.parse(JSON.stringify(orig));
    d.abbreviations = [...document.querySelectorAll('#abbrev-tbody tr')].map(tr => ({
      abbrev:   tr.querySelector('.ab-abbrev')?.value   || '',
      resolved: tr.querySelector('.ab-resolved')?.value || '',
      label:    tr.querySelector('.ab-label')?.value    || 'GESETZ',
      context:  (tr.querySelector('.ab-context')?.value || '')
                  .split(',').map(s=>s.trim()).filter(Boolean),
    }));
    // Synonyme aus Karten-Layout sammeln
    d.synonyms = [...document.querySelectorAll('.syn-canonical')].map((inp,i) => ({
      canonical: inp.value || '',
      variants:  getTags(`syn-v-${i}`),
      label:     document.querySelector(`.syn-label[data-i="${i}"]`)?.value || 'ROLLE',
      context:   getTags(`syn-c-${i}`),
    }));
    return d;
  }

  if (name === 'chunker') {
    const d = JSON.parse(JSON.stringify(orig));
    d.output = d.output || {};
    d.output.limit               = gi('tc-limit');
    d.output.text_preview_length = gi('tc-preview');
    const cls = gv('tc-class');
    d.document = d.document || {};
    d.document.force_class = (cls === '(automatisch)') ? null : cls;
    d.synthetic_tests = { enabled: gc('tc-synthetic') };
    d.chunking = d.chunking || {};
    d.chunking.class_a = {
      token_limit_parent: gi('ca-parent'),
      token_limit_child:  gi('ca-child'),
      token_limit_satz:   gi('ca-satz'),
    };
    d.chunking.class_b = {
      token_limit_parent: gi('cb-parent'),
      token_limit_child:  gi('cb-child'),
      overlap_ratio:      gn('cb-overlap'),
    };
    d.chunking.class_c = {
      token_min:     gi('cc-min'),
      token_max:     gi('cc-max'),
      overlap_ratio: gn('cc-overlap'),
    };
    // Chunk-Typen sammeln
    d.chunk_typen = {};
    document.querySelectorAll('#chunk-typen-tbody tr').forEach((tr, i) => {
      const name     = tr.querySelector('.ct-name')?.value?.trim();
      const ct       = tr.querySelector('.ct-chunk-type')?.value;
      const patterns = (tr.querySelector('.ct-patterns')?.value || '')
        .split('\n').map(s => s.trim()).filter(Boolean);
      if (name) d.chunk_typen[name] = {chunk_type: ct, patterns};
    });
    return d;
  }
  return orig;
}

// ── Listeners ─────────────────────────────────────────────────────────────────
function attachFormListeners(name, data) {
  document.querySelectorAll('.toggle input[type=checkbox]').forEach(cb => {
    const lbl = document.getElementById(cb.id+'-lbl');
    if (lbl) cb.addEventListener('change', () => {
      lbl.textContent = cb.checked ? 'Aktiv' : 'Inaktiv';
    });
  });
  // Synonym-Label-Badge live aktualisieren
  document.querySelectorAll('.syn-label').forEach(sel => {
    sel.addEventListener('change', () => {
      const i     = sel.dataset.i;
      const badge = document.getElementById('syn-lbl-badge-'+i);
      if (badge) {
        badge.className = 'label-badge label-'+sel.value;
        badge.textContent = sel.value;
      }
    });
  });
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveConfig() {
  if (!current) return;
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '⏳ Speichern...';

  try {
    let payload;
    if (viewMode === 'raw') {
      payload = { raw_yaml: rawYaml };
    } else {
      const data = collectFormData(current);
      payload = { content: data };
    }
    const r = await apiFetch(`${API}/${current}`, {
      method: 'PUT',
      body: JSON.stringify(payload),
    });
    unsaved = false;
    showToast('✓ ' + r.message, 'ok');
    await loadConfig(current);
  } catch(e) {
    showToast('Fehler: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Speichern';
  }
}

async function restoreBackup() {
  if (!current) return;
  if (!confirm('Backup wiederherstellen? Aktuelle Änderungen gehen verloren.')) return;
  try {
    const r = await apiFetch(`${API}/${current}/restore`, { method: 'POST' });
    showToast('↩ ' + r.message, 'warning');
    await loadConfig(current);
  } catch(e) {
    showToast('Kein Backup vorhanden.', 'err');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function markDirty() { unsaved = true; }

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Bereinigt PDF-Parsing-Artefakte für die Anzeige
function cleanDisplayText(text) {
  if (!text) return '';
  text = text.replace(/\n\n(?=[a-zäöüa-zäöü])/g, ' ');
  text = text.replace(/(?<![.!?:;\n])\n(?=[a-zA-ZäöüÄÖÜ])/g, ' ');
  text = text.replace(/\n{3,}/g, '\n\n');
  text = text.replace(/  +/g, ' ');
  return text.trim();
}

window.addEventListener('beforeunload', e => {
  if (unsaved) e.returnValue = 'Ungespeicherte Änderungen';
});

init();
</script>
